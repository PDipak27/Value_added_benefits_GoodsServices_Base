server:
  port: 8081
  shutdown: graceful

spring:
  application:
    name: order-service

  # ── §A-3/A5: validate the gateway-relayed Keycloak JWT (JWKS via issuer-uri).
  #    Keycloak must be up before order-service starts (discovery is eager). ──
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER:http://localhost:8088/realms/vab}

  # ── Postgres (write side: order state + Tram outbox + idempotency) ──────
  datasource:
    url: jdbc:postgresql://localhost:5432/vab
    username: eventuate
    password: eventuate
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: orders

  flyway:
    enabled: true
    schemas: orders
    locations:             #flyway auto adds locations.
    - classpath:db/migration
#    - classpath:flyway/postgresql

  # ── MongoDB (read side: projections) ───────────────────────────────────
  data:
    mongodb:
      uri: mongodb://localhost:27017/vab

# ── Catalog service (best-effort productType verification at placement) ─────
catalog:
  base-url: http://localhost:8085

# ── Eventuate Tram — outbox + dedup tables live in the 'eventuate' schema ──
eventuate:
  database:
    schema: eventuate

# ── Eventuate Tram / Kafka ─────────────────────────────────────────────────
eventuatelocal:
  kafka:
    bootstrap:
      servers: localhost:9094
  # zookeeper.connection.string intentionally omitted — KRaft mode, not needed

# ── Actuator ───────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.vab: DEBUG
    io.eventuate: INFO
