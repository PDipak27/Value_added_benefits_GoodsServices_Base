server:
  port: 8086
  shutdown: graceful

spring:
  application:
    name: fulfilment-service

  datasource:
    url: jdbc:postgresql://localhost:5432/vab
    username: eventuate
    password: eventuate
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: fulfilment

  flyway:
    enabled: true
    schemas: fulfilment
    locations: #flyway auto adds locations.
    - classpath:db/migration

# ── External OTT provider (DD-27): provisioning + bounded in-call retries ───
ott:
  base-url: http://localhost:8087
  max-attempts: 3
  retry-delay-ms: 200

# ── Keycloak client-credentials for the secured ott-service (§A-1 / DD-29) ──
keycloak:
  token-uri: http://localhost:8088/realms/vab/protocol/openid-connect/token
  client-id: vab-provisioning
  client-secret: vab-provisioning-secret
  scope: ott:provision

eventuatelocal:
  kafka:
    bootstrap:
      servers: localhost:9094

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.vab: DEBUG
    io.eventuate: INFO
