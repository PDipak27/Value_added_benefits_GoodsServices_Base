server:
  port: 8086
  shutdown: graceful

spring:
  application:
    name: fulfilment-service

  datasource:
    url: jdbc:postgresql://localhost:5432/vab
    username: eventuate
    password: eventuate
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: fulfilment

  flyway:
    enabled: true
    schemas: fulfilment
    locations: #flyway auto adds locations.
    - classpath:db/migration

# ── External OTT provider (DD-27): provisioning + bounded in-call retries ───
ott:
  base-url: http://localhost:8087
  max-attempts: 3
  retry-delay-ms: 200

# ── Keycloak client-credentials for the secured ott-service (§A-1 / DD-29) ──
# §4: Keycloak defaults to plain HTTP dev mode. For the §E2 edge-TLS setup, set
# KEYCLOAK_TOKEN_URI=https://... (fulfilment then trusts the mkcert CA via `mkcert -install`).
keycloak:
  token-uri: ${KEYCLOAK_TOKEN_URI:http://localhost:8088/realms/vab/protocol/openid-connect/token}
  client-id: vab-provisioning
  client-secret: vab-provisioning-secret
  scope: ott:provision

eventuatelocal:
  kafka:
    bootstrap:
      servers: localhost:9094

management:
  # §perf: no span export unless `obs` is active — old sampled traceparents on Kafka/HTTP hops
  # would otherwise force export attempts at Tempo. traceId in logs is unaffected.
  otlp:
    tracing:
      export:
        enabled: false
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.vab: DEBUG
    io.eventuate: INFO

---
# §perf: `obs` profile — allow OTLP span export to Tempo.
spring:
  config:
    activate:
      on-profile: obs
management:
  otlp:
    tracing:
      export:
        enabled: true
