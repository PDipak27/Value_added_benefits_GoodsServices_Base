server:
  port: 8085
  shutdown: graceful

spring:
  application:
    name: catalog-service

  # ── MongoDB (catalog store — DD-16) ─────────────────────────────────────
  # Own database for the Catalog bounded context. Offers are seeded on startup
  # by CatalogSeeder when the collection is empty (replaces the old Flyway seed).
  data:
    mongodb:
      uri: mongodb://localhost:27017/vab_catalog
    # ── Redis = L2 of the two-tier catalog cache (DD-17 / DD-18) ──────────
    # Short timeouts so that, if Redis is down, a cache call fails fast and the
    # CacheErrorHandler falls through to Mongo within ~0.5s instead of stalling
    # on Lettuce's multi-second default (DD-20).
    redis:
      host: localhost
      port: 6379
      timeout: 1000ms
      connect-timeout: 1000ms

  # Cache manager is defined in CacheConfig (Caffeine L1 + Redis L2),
  # so Spring Boot's cache auto-configuration backs off — no spring.cache.type.

# Two-tier catalog cache TTLs (DD-17/DD-18). L1 (in-process Caffeine) is the hot
# path; L2 (shared Redis) backstops L1 misses + bounds out-of-band staleness.
catalog:
  cache:
    l1-ttl-seconds: 120
    l2-ttl-seconds: 300
    l1-max-size: 10000

management:
  # §perf: no span export unless `obs` is active — old sampled traceparents on Kafka/HTTP hops
  # would otherwise force export attempts at Tempo. traceId in logs is unaffected.
  otlp:
    tracing:
      export:
        enabled: false
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.vab: DEBUG

---
# §perf: `obs` profile — allow OTLP span export to Tempo.
spring:
  config:
    activate:
      on-profile: obs
management:
  otlp:
    tracing:
      export:
        enabled: true
