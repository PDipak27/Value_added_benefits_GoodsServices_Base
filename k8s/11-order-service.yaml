# Order service — write side (Postgres + Tram outbox) + read models (Mongo /vab) + resource server.
# Calls catalog in-cluster, so CATALOG_BASE_URL is repointed at the catalog Service DNS.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: vabags
spec:
  replicas: 1
  selector:
    matchLabels: { app: order-service }
  template:
    metadata:
      labels: { app: order-service }
    spec:
      containers:
        - name: order-service
          image: vabags/order-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef: { name: vabags-endpoints }
            - secretRef: { name: vabags-db }
          env:
            - { name: CATALOG_BASE_URL, value: "http://catalog-service:8085" }
          startupProbe:
            httpGet: { path: /actuator/health/liveness, port: 8081 }
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8081 }
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8081 }
            periodSeconds: 5
          resources:
            requests: { cpu: "100m", memory: "384Mi" }
            limits: { memory: "640Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: vabags
spec:
  selector: { app: order-service }        # type defaults to ClusterIP (in-cluster only)
  ports:
    - port: 8081
      targetPort: 8081
