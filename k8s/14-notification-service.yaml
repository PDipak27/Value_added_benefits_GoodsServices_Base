# Notification service — pure saga participant (Postgres + Kafka).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: vabags
spec:
  replicas: 1
  selector:
    matchLabels: { app: notification-service }
  template:
    metadata:
      labels: { app: notification-service }
    spec:
      containers:
        - name: notification-service
          image: vabags/notification-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8084
          envFrom:
            - configMapRef: { name: vabags-endpoints }
            - secretRef: { name: vabags-db }
          startupProbe:
            httpGet: { path: /actuator/health/liveness, port: 8084 }
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8084 }
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8084 }
            periodSeconds: 5
          resources:
            requests: { cpu: "100m", memory: "384Mi" }
            limits: { memory: "640Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: vabags
spec:
  selector: { app: notification-service }
  ports:
    - port: 8084
      targetPort: 8084
