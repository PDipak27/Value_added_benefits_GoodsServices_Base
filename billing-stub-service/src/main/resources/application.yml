server:
  port: 8083
  shutdown: graceful

spring:
  application:
    name: billing-stub-service

  datasource:
    url: jdbc:postgresql://localhost:5432/vab
    username: eventuate
    password: eventuate
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: billing

  flyway:
    enabled: true
    schemas: billing
    locations: #flyway auto adds locations.
    - classpath:db/migration

eventuatelocal:
  kafka:
    bootstrap:
      servers: localhost:9094

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.vab: DEBUG
    io.eventuate: INFO
