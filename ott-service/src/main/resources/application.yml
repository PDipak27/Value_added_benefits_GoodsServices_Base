server:
  port: 8087
  shutdown: graceful
  # Error responses carry only the status — never a stack trace or exception
  # message in the body, so a caller (OttClient) can't ingest a trace.
  error:
    include-stacktrace: never
    include-message: never
    include-exception: false

spring:
  application:
    name: ott-service

  # Keycloak must be up before ott-service starts (issuer discovery is eager).
  security:
    oauth2:
      # §A-2: subscriber login (Authorization Code + PKCE) — public client, so
      # client-authentication-method=none makes Spring auto-apply PKCE.
      client:
        registration:
          keycloak:
            client-id: vab-ott
            client-authentication-method: none
            authorization-grant-type: authorization_code
            # Only 'openid' — the realm import's clientScopes array does not include
            # Keycloak's built-in 'profile' scope, and we don't need it: the only
            # subscriber claim we use (subscriberId) is a client-level protocol mapper,
            # emitted regardless of requested scopes.
            scope: openid
            redirect-uri: "{baseUrl}/login/oauth2/code/keycloak"
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_ISSUER:http://localhost:8088/realms/vab}
      # §A-1 / DD-29: validate Keycloak-issued JWTs for the M2M provisioning API.
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER:http://localhost:8088/realms/vab}

  datasource:
    url: jdbc:postgresql://localhost:5432/vab
    username: eventuate
    password: eventuate
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: ott

  flyway:
    enabled: true
    schemas: ott
    locations: #flyway auto adds locations.
    - classpath:db/migration

# §A-1 hardening: the audience the JWT must carry (Keycloak 'ott-service' mapper).
ott:
  required-audience: ott-service

management:
  # §perf: no span export unless `obs` is active — old sampled traceparents on Kafka/HTTP hops
  # would otherwise force export attempts at Tempo. traceId in logs is unaffected.
  otlp:
    tracing:
      export:
        enabled: false
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.vab: DEBUG

---
# §perf: `obs` profile — allow OTLP span export to Tempo.
spring:
  config:
    activate:
      on-profile: obs
management:
  otlp:
    tracing:
      export:
        enabled: true
