server:
  port: 8087
  shutdown: graceful
  # Error responses carry only the status — never a stack trace or exception
  # message in the body, so a caller (OttClient) can't ingest a trace.
  error:
    include-stacktrace: never
    include-message: never
    include-exception: false

spring:
  application:
    name: ott-service

  datasource:
    url: jdbc:postgresql://localhost:5432/vab
    username: eventuate
    password: eventuate
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: ott

  flyway:
    enabled: true
    schemas: ott
    locations: #flyway auto adds locations.
    - classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.vab: DEBUG
