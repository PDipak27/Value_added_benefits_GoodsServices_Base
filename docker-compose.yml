services:

  # ── Kafka (KRaft — no ZooKeeper) ─────────────────────────────────────────
  kafka:
    image: apache/kafka:3.7.1
    container_name: vab-kafka
    ports:
      - "9092:9092" 
#for docker network internal
      - "9094:9094" 
# for external services like order-service.
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka:9092,EXTERNAL://localhost:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms128m"
      TZ: Asia/Kolkata
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 15s
      retries: 12
      start_period: 60s


  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    container_name: vab-zk
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      TZ: Asia/Kolkata
    healthcheck:
      test: ["CMD", "bash", "-c", "zookeeper-shell localhost:2181 ls / >/dev/null 2>&1"]
      interval: 10s
      timeout: 15s
      retries: 12
      start_period: 30s

  # ── Eventuate CDC — Postgres Polling → Kafka ─────────────────────────────
  # Polls eventuate.events / eventuate.message for published=0 rows.
  # Connects to your LOCAL Postgres 18 via host.docker.internal.
  # Prereq: run deploy/postgres-init/01-eventuate-schema.sql first.
  eventuate-cdc:
    image: eventuateio/eventuate-cdc-service:0.19.0.RELEASE
    container_name: vab-cdc
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_healthy
      zookeeper:
        condition: service_healthy

    # Linux hosts: host.docker.internal resolves via extra_hosts below
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/vab
      SPRING_DATASOURCE_USERNAME: eventuate
      SPRING_DATASOURCE_PASSWORD: eventuate
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver

      EVENTUATELOCAL_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EVENTUATELOCAL_ZOOKEEPER_CONNECTION_STRING: zookeeper:2181
      # Polling mode — no wal2json, no replication slot needed
      SPRING_PROFILES_ACTIVE: EventuatePolling,Kafka

      # ── Pipeline: routes reader output to Kafka in Eventuate-Local format ─
      EVENTUATE_CDC_PIPELINE_LOCALPIPELINE_TYPE: eventuate-local
      EVENTUATE_CDC_PIPELINE_LOCALPIPELINE_READER: localreader
      EVENTUATE_CDC_PIPELINE_LOCALPIPELINE_EVENTUATEDATABASESCHEMA: eventuate

      EVENTUATE_CDC_PIPELINE_TRAMPIPELINE_TYPE: eventuate-tram
      EVENTUATE_CDC_PIPELINE_TRAMPIPELINE_READER: tramreader
      EVENTUATE_CDC_PIPELINE_TRAMPIPELINE_EVENTUATEDATABASESCHEMA: eventuate

      # Reader for Local ES events
      EVENTUATE_CDC_READER_LOCALREADER_TYPE: polling
      EVENTUATE_CDC_READER_LOCALREADER_DATASOURCEURL: jdbc:postgresql://host.docker.internal:5432/vab
      EVENTUATE_CDC_READER_LOCALREADER_DATASOURCEUSERNAME: eventuate
      EVENTUATE_CDC_READER_LOCALREADER_DATASOURCEPASSWORD: eventuate
      EVENTUATE_CDC_READER_LOCALREADER_DATASOURCEDRIVERCLASSNAME: org.postgresql.Driver
      EVENTUATE_CDC_READER_LOCALREADER_LEADERSHIPLOCKPATH: /eventuate/cdc/leader/local
      EVENTUATE_CDC_READER_LOCALREADER_OUTBOXID: 1

      # Reader for Tram messages
      EVENTUATE_CDC_READER_TRAMREADER_TYPE: polling
      EVENTUATE_CDC_READER_TRAMREADER_DATASOURCEURL: jdbc:postgresql://host.docker.internal:5432/vab
      EVENTUATE_CDC_READER_TRAMREADER_DATASOURCEUSERNAME: eventuate
      EVENTUATE_CDC_READER_TRAMREADER_DATASOURCEPASSWORD: eventuate
      EVENTUATE_CDC_READER_TRAMREADER_DATASOURCEDRIVERCLASSNAME: org.postgresql.Driver
      EVENTUATE_CDC_READER_TRAMREADER_LEADERSHIPLOCKPATH: /eventuate/cdc/leader/tram
      EVENTUATE_CDC_READER_TRAMREADER_OUTBOXID: 2
      
      JAVA_OPTS: "-Xmx512m"
      TZ: Asia/Kolkata
    healthcheck:
      # CDC exposes Spring Boot Actuator on container port 8080.
      # curl is present in the eventuateio/eventuate-cdc-service image.
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 120s
    restart: on-failure

  # ── MongoDB — read projections ────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: vab-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis — catalog read-cache (DD-17) ───────────────────────────────────
  # Shared cache for the read-heavy, write-rare catalog. Invalidation is local
  # evict-on-write (catalog admin API) + a 15s TTL backstop — not event-driven.
  redis:
    image: redis:7-alpine
    container_name: vab-redis
    ports:
      - "6379:6379"
    environment:
      TZ: Asia/Kolkata
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Apicurio Schema Registry (in-memory, dev only) ────────────────────────
  apicurio:
    image: apicurio/apicurio-registry-mem:latest-release
    container_name: vab-apicurio
    ports:
      - "8090:8080"
    environment:
      QUARKUS_PROFILE: dev
      TZ: Asia/Kolkata

  # ── Keycloak — OIDC Provider (DD-29 / §A-1), Postgres-backed ──────────────
  # The OpenID Provider for federated auth. Phase A-1 ships only the
  # client-credentials provisioning client (realm 'vab', client 'vab-provisioning',
  # scope 'ott:provision'). Reuses the LOCAL Postgres — create the DB first via
  # deploy/postgres-init/03-keycloak-db.sql. Realm imported on start.
  # Issuer for resource servers: https://localhost:8088/realms/vab  (§E2 edge TLS).
  # §4: dev-mode Keycloak. DEFAULT = plain HTTP (host :8088 → container :8080) — no certs needed,
  # fastest to boot. For the §E2 edge-TLS setup, layer docker-compose.keycloak-tls.yml on top and
  # set KC_HTTP_PORT=8443 (see that file's header for the full recipe).
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: vab-keycloak
    command: ["start-dev", "--import-realm"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://host.docker.internal:5432/keycloak
      KC_DB_USERNAME: eventuate
      KC_DB_PASSWORD: eventuate
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      TZ: Asia/Kolkata
    ports:
      # Host 8088 → container 8080 (HTTP dev) by default; TLS mode sets KC_HTTP_PORT=8443.
      - "8088:${KC_HTTP_PORT:-8080}"
    volumes:
      - ./deploy/keycloak:/opt/keycloak/data/import:ro

  # ── Observability (§C2): services push JSON logs (loki4j) → Loki → Grafana ──
  # §perf: all three are gated behind the `obs` compose profile — they only start
  # when COMPOSE_PROFILES=obs (or `docker compose --profile obs up`), keeping RAM free otherwise.
  loki:
    image: grafana/loki:3.0.0
    container_name: vab-loki
    profiles: ["obs"]
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./deploy/observability/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki

  grafana:
    image: grafana/grafana:10.4.0
    container_name: vab-grafana
    profiles: ["obs"]
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"   # skip login for local dev
    ports:
      - "3000:3000"                          # UI: http://localhost:3000
    depends_on:
      - loki
    volumes:
      - ./deploy/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana

  # ── Tracing (§C2 scope C): services push OTLP spans → Tempo; Grafana reads it ──
  tempo:
    image: grafana/tempo:2.5.0
    container_name: vab-tempo
    profiles: ["obs"]
    command: ["-config.file=/etc/tempo/tempo-config.yaml"]
    ports:
      - "3200:3200"   # Tempo query API (Grafana datasource)
      - "4317:4317"   # OTLP gRPC receiver (OpenTelemetry SDK default — services export here)
      - "4318:4318"   # OTLP HTTP receiver
    volumes:
      - ./deploy/observability/tempo-config.yaml:/etc/tempo/tempo-config.yaml:ro
      - tempo_data:/var/tempo

volumes:
  mongo_data:
  loki_data:
  grafana_data:
  tempo_data:
